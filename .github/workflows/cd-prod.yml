name: CD Prod

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type "deploy" to confirm production deployment'
        required: true
        default: ""
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  id-token: write   # Required for OIDC token exchange
  contents: read

env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform/environments/prod
  PREFIX: cash5-prod

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Plan: build artifacts, run terraform plan, post output as job summary.
  # Approval gate is enforced by the "prod" GitHub environment before Apply runs.
  # ────────────────────────────────────────────────────────────────────────────
  plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    environment: prod-plan
    outputs:
      plan_exitcode: ${{ steps.plan.outputs.exitcode }}

    steps:
      - name: Validate manual dispatch confirmation
        if: github.event_name == 'workflow_dispatch'
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "deploy" ]; then
            echo "ERROR: You must type 'deploy' in the confirm input to proceed."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./... -count=1

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Terraform Validate
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform validate

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          set +e
          terraform plan -out=tfplan -input=false -detailed-exitcode 2>&1 | tee plan.txt
          EXITCODE=${PIPESTATUS[0]}
          echo "exitcode=${EXITCODE}" >> "$GITHUB_OUTPUT"
          set -e
          # Exit codes: 0 = no changes, 1 = error, 2 = changes present.
          # We treat 0 and 2 as success here; the apply job filters on exitcode.
          [ "${EXITCODE}" -ne 1 ] || exit 1

      - name: Post plan to job summary
        run: |
          echo "## Terraform Plan (prod)" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```hcl' >> "$GITHUB_STEP_SUMMARY"
          cat "${{ env.TF_WORKING_DIR }}/plan.txt" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 1

  # ────────────────────────────────────────────────────────────────────────────
  # Apply: requires manual approval via the "prod" GitHub environment.
  # Runs only when the plan detected changes (exitcode == 2).
  # ────────────────────────────────────────────────────────────────────────────
  apply:
    name: Terraform Apply (requires manual approval)
    runs-on: ubuntu-latest
    needs: plan
    environment: prod
    if: needs.plan.outputs.plan_exitcode == '2'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # ── Build Lambda binaries ───────────────────────────────────────────
      - name: Build api-handler
        run: |
          GOOS=linux GOARCH=arm64 go build -o bootstrap ./cmd/api-handler
          zip api-handler.zip bootstrap
          rm bootstrap

      - name: Build ingestion-job
        run: |
          GOOS=linux GOARCH=arm64 go build -o bootstrap ./cmd/ingestion-job
          zip ingestion-job.zip bootstrap
          rm bootstrap

      - name: Build reconciliation-job
        run: |
          GOOS=linux GOARCH=arm64 go build -o bootstrap ./cmd/reconciliation-job
          zip reconciliation-job.zip bootstrap
          rm bootstrap

      # ── AWS credentials via OIDC ────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN_PROD }}
          aws-region: ${{ env.AWS_REGION }}

      # ── Upload artifacts to S3 ──────────────────────────────────────────
      - name: Upload Lambda artifacts to S3
        run: |
          BUCKET="${{ env.PREFIX }}-model-artifacts"
          aws s3 cp api-handler.zip        s3://${BUCKET}/lambda/api-handler/latest.zip
          aws s3 cp ingestion-job.zip      s3://${BUCKET}/lambda/ingestion-job/latest.zip
          aws s3 cp reconciliation-job.zip s3://${BUCKET}/lambda/reconciliation-job/latest.zip

      # ── Terraform ───────────────────────────────────────────────────────
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform init

      - name: Download plan artifact
        uses: actions/download-artifact@v4
        with:
          name: tfplan-prod
          path: ${{ env.TF_WORKING_DIR }}

      - name: Terraform Apply
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: terraform apply -input=false tfplan

      # ── Hot-swap Lambda code ────────────────────────────────────────────
      - name: Update Lambda function code
        run: |
          BUCKET="${{ env.PREFIX }}-model-artifacts"
          for FN in api-handler ingestion-job reconciliation-job; do
            aws lambda update-function-code \
              --function-name "${{ env.PREFIX }}-${FN}" \
              --s3-bucket "${BUCKET}" \
              --s3-key "lambda/${FN}/latest.zip" \
              --architectures arm64 \
              --no-cli-pager
          done
